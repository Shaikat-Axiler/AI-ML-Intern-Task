<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LLM Explorer Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Base ────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;
  --surface:#0d1220;
  --surface2:#111827;
  --border:#1e2d45;
  --border2:#243352;
  --accent:#00d4ff;
  --accent2:#7c3aed;
  --accent3:#10b981;
  --warn:#f59e0b;
  --danger:#ef4444;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#64748b;
  --font-head:'Syne',sans-serif;
  --font-mono:'Space Mono',monospace;
  --r:8px;
  --r2:12px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden}

/* ── Background grid ─────────────────────────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0
}
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,212,255,.08),transparent);
  pointer-events:none;z-index:0
}

/* ── Layout ──────────────────────────────────────────────────────────────── */
#app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 24px 80px}

/* ── Header ──────────────────────────────────────────────────────────────── */
header{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:32px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 0 20px rgba(0,212,255,.3)}
h1{font-family:var(--font-head);font-size:1.75rem;font-weight:800;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{color:var(--text3);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase}
nav{display:flex;gap:4px;margin-top:20px}
.nav-btn{background:none;border:1px solid transparent;color:var(--text2);
  font-family:var(--font-mono);font-size:.78rem;padding:6px 16px;border-radius:6px;
  cursor:pointer;transition:all .2s;letter-spacing:.05em;text-transform:uppercase}
.nav-btn.active,.nav-btn:hover{background:var(--surface);border-color:var(--border2);color:var(--accent)}
.nav-btn.active{border-color:var(--accent);color:var(--accent)}

/* ── Tab Panels ──────────────────────────────────────────────────────────── */
.panel{display:none;animation:fadeUp .3s ease}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── Cards ───────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:24px;margin-bottom:20px}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px}

/* ── Form Controls ───────────────────────────────────────────────────────── */
label{display:block;font-size:.72rem;color:var(--text3);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:6px}
input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r);color:var(--text);font-family:var(--font-mono);font-size:.85rem;
  padding:10px 14px;transition:border .2s,box-shadow .2s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.12)}
textarea{resize:vertical;min-height:120px;line-height:1.6}
select{cursor:pointer}
select option{background:var(--surface2)}

/* ── Grid helpers ────────────────────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:var(--r);
  font-family:var(--font-mono);font-size:.82rem;font-weight:700;cursor:pointer;
  padding:10px 22px;transition:all .2s;letter-spacing:.04em;text-transform:uppercase}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0099cc);color:#000}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,212,255,.3)}
.btn-secondary{background:var(--surface2);border:1px solid var(--border2);color:var(--text2)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.btn-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--accent3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important}
.btn-icon{padding:8px 10px;font-size:1rem}

/* ── Technique Chips ─────────────────────────────────────────────────────── */
.technique-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:4px}
.tech-chip{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;
  padding:6px 16px;font-size:.75rem;cursor:pointer;transition:all .2s;
  font-family:var(--font-mono);color:var(--text2);display:flex;align-items:center;gap:6px}
.tech-chip:hover{border-color:var(--accent);color:var(--accent)}
.tech-chip.selected{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent)}

/* ── Model Selectors ─────────────────────────────────────────────────────── */
.model-selector{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);
  padding:16px;cursor:pointer;transition:all .2s;position:relative}
.model-selector.selected-a{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.15)}
.model-selector.selected-b{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(124,58,237,.15)}
.model-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;
  background:var(--border);color:var(--text2);font-family:var(--font-mono)}
.model-name{font-family:var(--font-head);font-weight:700;font-size:.95rem;margin:6px 0 2px}
.model-desc{font-size:.72rem;color:var(--text3);line-height:1.5}
.model-radio{position:absolute;top:14px;right:14px;width:16px;height:16px;
  border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .2s}
.model-selector.selected-a .model-radio{border-color:var(--accent);background:var(--accent)}
.model-selector.selected-b .model-radio{border-color:var(--accent2);background:var(--accent2)}

/* ── Compare Results ─────────────────────────────────────────────────────── */
.compare-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.model-label{font-family:var(--font-head);font-weight:700;font-size:.9rem}
.model-tag-a{color:var(--accent)}
.model-tag-b{color:var(--accent2)}
.response-body{font-size:.83rem;line-height:1.8;white-space:pre-wrap;word-break:break-word;
  max-height:400px;overflow-y:auto;padding-right:4px}
.response-body::-webkit-scrollbar{width:4px}
.response-body::-webkit-scrollbar-track{background:transparent}
.response-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.meta-row{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.meta-chip{font-size:.7rem;color:var(--text3);display:flex;align-items:center;gap:4px}
.meta-chip span{color:var(--text2)}

/* ── Star Rating ─────────────────────────────────────────────────────────── */
.star-row{display:flex;gap:4px;margin-top:14px}
.star{font-size:1.4rem;cursor:pointer;transition:transform .15s,filter .15s;filter:grayscale(1);opacity:.4}
.star.lit{filter:none;opacity:1}
.star:hover{transform:scale(1.2)}
.rating-label{font-size:.7rem;color:var(--text3);margin-top:4px;letter-spacing:.05em}

/* ── Save Modal ──────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;
  align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);
  animation:fadeIn .2s ease}
.modal-overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);
  padding:28px;width:100%;max-width:480px;position:relative}
.modal h3{font-family:var(--font-head);font-weight:700;margin-bottom:20px;font-size:1.1rem}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;
  color:var(--text3);cursor:pointer;font-size:1.1rem}
.modal-close:hover{color:var(--text)}
.form-row{margin-bottom:16px}
.tags-input{display:flex;flex-wrap:wrap;gap:6px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;min-height:44px;cursor:text}
.tag{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);color:var(--accent);
  border-radius:10px;padding:2px 10px;font-size:.72rem;display:flex;align-items:center;gap:4px}
.tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.9rem;line-height:1}
.tag-input-field{background:none;border:none;outline:none;color:var(--text);
  font-family:var(--font-mono);font-size:.82rem;flex:1;min-width:100px}

/* ── Favorites ───────────────────────────────────────────────────────────── */
.fav-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);
  padding:20px;margin-bottom:14px;transition:border .2s}
.fav-card:hover{border-color:var(--border2)}
.fav-title{font-family:var(--font-head);font-weight:700;font-size:1rem;margin-bottom:6px;
  display:flex;align-items:center;gap:8px}
.fav-prompt{font-size:.78rem;color:var(--text2);line-height:1.6;margin-bottom:10px}
.fav-meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.fav-tag{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);
  color:#a78bfa;border-radius:10px;padding:2px 10px;font-size:.68rem}
.star-display{display:flex;gap:2px;font-size:1rem}

/* ── Stats ───────────────────────────────────────────────────────────────── */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);
  padding:20px;text-align:center}
.stat-num{font-family:var(--font-head);font-size:2.4rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-label{font-size:.75rem;color:var(--text2);width:120px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:var(--border);border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.bar-count{font-size:.72rem;color:var(--text3);width:30px}

/* ── Loading ─────────────────────────────────────────────────────────────── */
.loading{display:flex;align-items:center;gap:12px;color:var(--text2);font-size:.85rem;padding:20px 0}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Error / Empty States ────────────────────────────────────────────────── */
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  border-radius:var(--r);padding:14px 18px;color:var(--danger);font-size:.82rem;line-height:1.6}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:.85rem;line-height:1.8}

/* ── Prompt Preview ──────────────────────────────────────────────────────── */
.prompt-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;font-size:.75rem;color:var(--text2);line-height:1.8;white-space:pre-wrap;max-height:160px;overflow-y:auto}
.prompt-preview .system-label{color:var(--accent3);font-weight:700;display:block;margin-bottom:4px}
.prompt-preview .user-label{color:var(--warn);font-weight:700;display:block;margin:8px 0 4px}

/* ── Range slider ────────────────────────────────────────────────────────── */
input[type=range]{padding:0;background:none;border:none;box-shadow:none;accent-color:var(--accent)}
.slider-row{display:flex;align-items:center;gap:12px}
.slider-val{font-size:.82rem;color:var(--accent);width:36px;text-align:right;flex-shrink:0}

/* ── History ─────────────────────────────────────────────────────────────── */
.hist-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:border .2s;
  display:flex;align-items:center;gap:14px}
.hist-row:hover{border-color:var(--border2)}
.hist-prompt{flex:1;font-size:.8rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-models{font-size:.7rem;color:var(--text3)}
.hist-tech{background:var(--surface2);border-radius:6px;padding:2px 8px;font-size:.68rem;color:var(--text3)}
.fav-star{font-size:1rem;color:var(--warn)}

/* ── Divider ─────────────────────────────────────────────────────────────── */
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
.section-title{font-family:var(--font-head);font-weight:700;font-size:1.1rem;margin-bottom:16px;
  display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div id="app">

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">🧪</div>
    <div>
      <h1>LLM Explorer Toolkit</h1>
      <div class="tagline">Compare · Prompt · Evaluate · Save</div>
    </div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="switchTab('compare')">⚡ Compare</button>
    <button class="nav-btn" onclick="switchTab('favorites')">★ Favorites</button>
    <button class="nav-btn" onclick="switchTab('history')">🕘 History</button>
    <button class="nav-btn" onclick="switchTab('stats')">📊 Stats</button>
  </nav>
</header>

<!-- ── Compare Tab ─────────────────────────────────────────────────────── -->
<div id="tab-compare" class="panel active">

  <!-- Model Selection -->
  <div class="card">
    <div class="section-title">Select Models</div>
    <div class="grid-2" id="model-grid">
      <div class="loading"><div class="spinner"></div> Loading models…</div>
    </div>
    <div style="margin-top:14px;display:flex;gap:20px">
      <div style="flex:1">
        <label>Model A <span class="model-tag-a">●</span></label>
        <select id="sel-model-a"></select>
      </div>
      <div style="flex:1">
        <label>Model B <span class="model-tag-b">●</span></label>
        <select id="sel-model-b"></select>
      </div>
    </div>
  </div>

  <!-- Prompting Technique -->
  <div class="card">
    <div class="section-title">Prompting Technique</div>
    <div class="technique-grid" id="technique-chips"></div>
    <div id="technique-desc" style="font-size:.78rem;color:var(--text3);margin-top:10px;min-height:20px"></div>
  </div>

  <!-- Prompt Input -->
  <div class="card">
    <div class="section-title">Prompt</div>
    <div class="form-row">
      <label>System Prompt (optional)</label>
      <textarea id="system-prompt" rows="2" placeholder="e.g. You are a senior software engineer…"></textarea>
    </div>
    <div class="form-row">
      <label>User Message</label>
      <textarea id="user-prompt" rows="4" placeholder="Enter your prompt here…"></textarea>
    </div>

    <!-- Advanced Settings -->
    <details style="margin-top:4px">
      <summary style="cursor:pointer;font-size:.75rem;color:var(--text3);user-select:none">⚙️ Advanced Settings</summary>
      <div class="grid-2" style="margin-top:14px">
        <div>
          <label>Temperature</label>
          <div class="slider-row">
            <input type="range" id="temperature" min="0" max="1" step="0.05" value="0.7"
              oninput="document.getElementById('temp-val').textContent=this.value"/>
            <span class="slider-val" id="temp-val">0.7</span>
          </div>
        </div>
        <div>
          <label>Max Tokens</label>
          <div class="slider-row">
            <input type="range" id="max-tokens" min="64" max="2048" step="64" value="512"
              oninput="document.getElementById('tok-val').textContent=this.value"/>
            <span class="slider-val" id="tok-val">512</span>
          </div>
        </div>
      </div>
    </details>

    <!-- Prompt Preview -->
    <div id="prompt-preview-wrap" style="margin-top:16px;display:none">
      <label>Effective Prompt (after technique applied)</label>
      <div class="prompt-preview" id="prompt-preview"></div>
    </div>

    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
      <button class="btn btn-primary" id="run-btn" onclick="runComparison()">▶ Run Comparison</button>
      <button class="btn btn-secondary" onclick="previewPrompt()">👁 Preview Prompt</button>
      <button class="btn btn-secondary" onclick="clearForm()">✕ Clear</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results-section" style="display:none">
    <div class="section-title">Results</div>
    <div class="grid-2" id="results-grid"></div>

    <!-- Save as Favourite -->
    <div style="display:flex;justify-content:center;margin-top:20px">
      <button class="btn btn-success" onclick="openSaveModal()">★ Save as Favourite</button>
    </div>
  </div>

</div><!-- /compare -->

<!-- ── Favorites Tab ───────────────────────────────────────────────────── -->
<div id="tab-favorites" class="panel">
  <div class="section-title">Saved Favourites</div>
  <div id="favorites-list"><div class="loading"><div class="spinner"></div> Loading…</div></div>
</div>

<!-- ── History Tab ─────────────────────────────────────────────────────── -->
<div id="tab-history" class="panel">
  <div class="section-title">Recent Sessions</div>
  <div id="history-list"><div class="loading"><div class="spinner"></div> Loading…</div></div>
</div>

<!-- ── Stats Tab ──────────────────────────────────────────────────────── -->
<div id="tab-stats" class="panel">
  <div class="section-title">Usage Statistics</div>
  <div id="stats-content"><div class="loading"><div class="spinner"></div> Loading…</div></div>
</div>

</div><!-- /app -->

<!-- ── Save Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="save-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeSaveModal()">✕</button>
    <h3>★ Save to Favourites</h3>
    <div class="form-row">
      <label>Title</label>
      <input type="text" id="fav-title" placeholder="e.g. Coding assistant CoT vs Zero-shot"/>
    </div>
    <div class="form-row">
      <label>Tags (press Enter to add)</label>
      <div class="tags-input" id="tags-container" onclick="document.getElementById('tag-field').focus()">
        <input class="tag-input-field" id="tag-field" placeholder="Add tag…" onkeydown="handleTagInput(event)"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-secondary" onclick="closeSaveModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFavorite()">Save</button>
    </div>
  </div>
</div>

<!-- ── Session Detail Modal ───────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="detail-modal" style="align-items:flex-start;padding:40px 20px;overflow-y:auto">
  <div class="modal" style="max-width:860px;width:100%">
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const API = '';   // same-origin; change to 'http://localhost:8000' for standalone frontend
let state = {
  models: {},
  techniques: {},
  selectedTechnique: 'zero_shot',
  currentSession: null,
  pendingTags: [],
  ratings: {},         // { a: {rating,comment}, b: {rating,comment} }
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const stars = (n, max=5) => Array.from({length:max},(_,i)=>i<n?'★':'☆').join('');

async function api(path, opts={}) {
  const res = await fetch(API + path, {
    headers: {'Content-Type':'application/json'},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    const tabs = ['compare','favorites','history','stats'];
    b.classList.toggle('active', tabs[i]===name);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  $('tab-'+name).classList.add('active');
  if (name==='favorites') loadFavorites();
  if (name==='history')   loadHistory();
  if (name==='stats')     loadStats();
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    [state.models, state.techniques] = await Promise.all([
      api('/api/models'), api('/api/techniques')
    ]);
    renderModelSelectors();
    renderTechniqueChips();
  } catch(e) {
    $('model-grid').innerHTML = `<div class="error-box">⚠️ Could not connect to backend.<br/>Make sure the FastAPI server is running on port 8000.</div>`;
  }
}

// ── Models ────────────────────────────────────────────────────────────────────
function renderModelSelectors() {
  const entries = Object.entries(state.models);
  const selA = $('sel-model-a'), selB = $('sel-model-b');
  selA.innerHTML = selB.innerHTML = '';
  entries.forEach(([id,m]) => {
    [selA,selB].forEach(sel=>{
      const o = document.createElement('option');
      o.value=id; o.textContent=m.label; sel.appendChild(o);
    });
  });
  if (entries.length>1) selB.selectedIndex = 1;
  $('model-grid').innerHTML = entries.slice(0,6).map(([id,m])=>`
    <div class="model-selector card-sm" style="--clr:${m.color}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <span class="model-badge" style="background:${m.color}22;color:${m.color}">${m.badge}</span>
        <div style="font-size:.7rem;color:var(--text3)">${id}</div>
      </div>
      <div class="model-name" style="color:${m.color}">${m.label}</div>
      <div class="model-desc">${m.description}</div>
    </div>
  `).join('');
}

// ── Techniques ────────────────────────────────────────────────────────────────
function renderTechniqueChips() {
  $('technique-chips').innerHTML = Object.entries(state.techniques).map(([id,t])=>`
    <div class="tech-chip ${id===state.selectedTechnique?'selected':''}"
         onclick="selectTechnique('${id}')">
      <span>${t.icon}</span> ${t.label}
    </div>
  `).join('');
  updateTechDesc();
}

function selectTechnique(id) {
  state.selectedTechnique = id;
  document.querySelectorAll('.tech-chip').forEach((c,i)=>{
    const ids = Object.keys(state.techniques);
    c.classList.toggle('selected', ids[i]===id);
  });
  updateTechDesc();
  $('prompt-preview-wrap').style.display='none';
}

function updateTechDesc() {
  const t = state.techniques[state.selectedTechnique];
  $('technique-desc').textContent = t ? `${t.icon} ${t.description}` : '';
}

// ── Prompt Preview ────────────────────────────────────────────────────────────
async function previewPrompt() {
  const prompt = $('user-prompt').value.trim();
  if (!prompt) { alert('Please enter a prompt first.'); return; }
  const sysRaw = $('system-prompt').value.trim() || 'You are a helpful, knowledgeable assistant.';

  // Build preview locally (mirrors backend logic)
  const previews = {
    zero_shot: { sys: sysRaw, user: prompt },
    one_shot:  { sys: sysRaw, user: `Example:\nUser: What is the capital of France?\nAssistant: The capital of France is Paris, a city known for the Eiffel Tower and rich cultural heritage.\n\nNow answer the following:\n${prompt}` },
    few_shot:  { sys: sysRaw, user: `Here are some examples of high-quality responses:\n\nQ: Explain photosynthesis simply.\nA: Photosynthesis is how plants make food from sunlight…\n\nQ: What is machine learning?\nA: Machine learning is teaching computers to learn from data…\n\nNow answer this question in the same clear, concise style:\n${prompt}` },
    chain_of_thought: { sys: sysRaw+'\nThink through problems step by step. Show your reasoning before giving a final answer.\nFormat: Thinking: [...] Answer: [...]', user: `Let's think through this carefully:\n\n${prompt}` },
    role_play: { sys: 'You are a world-class expert with decades of experience across multiple disciplines…', user: `As an expert, please address the following:\n\n${prompt}` },
  };
  const p = previews[state.selectedTechnique] || previews.zero_shot;
  $('prompt-preview').innerHTML =
    `<span class="system-label">SYSTEM</span>${esc(p.sys)}<span class="user-label">USER</span>${esc(p.user)}`;
  $('prompt-preview-wrap').style.display='block';
}

// ── Run Comparison ────────────────────────────────────────────────────────────
async function runComparison() {
  const prompt = $('user-prompt').value.trim();
  if (!prompt) { alert('Please enter a prompt.'); return; }

  const btn = $('run-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Running…';
  $('results-section').style.display='none';
  state.ratings = {};
  state.currentSession = null;

  try {
    const session = await api('/api/compare', {
      method:'POST',
      body: {
        prompt,
        model_a: $('sel-model-a').value,
        model_b: $('sel-model-b').value,
        technique: state.selectedTechnique,
        system_prompt: $('system-prompt').value.trim() || null,
        temperature: parseFloat($('temperature').value),
        max_tokens: parseInt($('max-tokens').value),
      }
    });
    state.currentSession = session;
    renderResults(session);
    $('results-section').style.display='block';
    $('results-section').scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) {
    $('results-section').innerHTML = `<div class="error-box">⚠️ ${esc(e.message)}</div>`;
    $('results-section').style.display='block';
  } finally {
    btn.disabled=false; btn.textContent='▶ Run Comparison';
  }
}

// ── Render Results ────────────────────────────────────────────────────────────
function renderResults(session) {
  const sides = [
    {key:'a', data:session.model_a, cls:'model-tag-a', color:'var(--accent)'},
    {key:'b', data:session.model_b, cls:'model-tag-b', color:'var(--accent2)'},
  ];
  $('results-grid').innerHTML = sides.map(({key,data,cls,color})=>`
    <div class="card" id="result-card-${key}">
      <div class="compare-header">
        <div class="model-label ${cls}">${data.name||'Model '+key.toUpperCase()}</div>
        ${data.error ? '<span style="font-size:.7rem;color:var(--danger)">⚠ error</span>' : ''}
      </div>
      ${data.error
        ? `<div class="error-box">${esc(data.error)}</div>`
        : `<div class="response-body">${esc(data.response||'(empty response)')}</div>`}
      <div class="meta-row">
        <div class="meta-chip">⏱ <span>${data.latency_ms||0}ms</span></div>
        <div class="meta-chip">🔤 <span>${data.tokens_used||0} tokens</span></div>
        <div class="meta-chip">⚡ <span>${state.selectedTechnique.replace('_',' ')}</span></div>
      </div>
      <div class="rating-label">Rate this response</div>
      <div class="star-row" id="stars-${key}">
        ${[1,2,3,4,5].map(n=>`<span class="star" data-n="${n}" onclick="setRating('${key}',${n})">★</span>`).join('')}
      </div>
      <div style="margin-top:8px">
        <input type="text" id="comment-${key}" placeholder="Optional comment…" style="font-size:.75rem"/>
      </div>
      <div style="margin-top:8px">
        <button class="btn btn-secondary" style="font-size:.72rem;padding:6px 14px" onclick="submitRating('${key}')">Submit Rating</button>
        <span id="rating-status-${key}" style="font-size:.72rem;color:var(--accent3);margin-left:8px"></span>
      </div>
    </div>
  `).join('');
}

// ── Rating ────────────────────────────────────────────────────────────────────
function setRating(side, n) {
  state.ratings[side] = state.ratings[side] || {};
  state.ratings[side].rating = n;
  document.querySelectorAll(`#stars-${side} .star`).forEach((s,i)=>{
    s.classList.toggle('lit', i<n);
  });
}

async function submitRating(side) {
  if (!state.currentSession) return;
  const rating = state.ratings[side]?.rating;
  if (!rating) { alert('Please select a star rating first.'); return; }
  const comment = $('comment-'+side)?.value || '';
  try {
    await api('/api/rate', {method:'POST', body:{
      session_id: state.currentSession.session_id,
      model: side, rating, comment
    }});
    $('rating-status-'+side).textContent = '✓ Saved';
  } catch(e) { $('rating-status-'+side).textContent = '⚠ Failed'; }
}

// ── Save Favourite ────────────────────────────────────────────────────────────
function openSaveModal() {
  if (!state.currentSession) return;
  state.pendingTags = [];
  $('fav-title').value = '';
  $('tag-field').value = '';
  $('tags-container').querySelectorAll('.tag').forEach(t=>t.remove());
  $('save-modal').classList.remove('hidden');
}
function closeSaveModal() { $('save-modal').classList.add('hidden'); }

function handleTagInput(e) {
  if (e.key==='Enter' || e.key===',') {
    e.preventDefault();
    const val = $('tag-field').value.trim().replace(',','');
    if (val && !state.pendingTags.includes(val)) {
      state.pendingTags.push(val);
      const tag = document.createElement('div');
      tag.className='tag';
      tag.innerHTML=`${esc(val)}<button onclick="removeTag('${esc(val)}',this.parentElement)">×</button>`;
      $('tags-container').insertBefore(tag, $('tag-field'));
    }
    $('tag-field').value='';
  }
}
function removeTag(val, el) {
  state.pendingTags = state.pendingTags.filter(t=>t!==val);
  el.remove();
}

async function saveFavorite() {
  const title = $('fav-title').value.trim();
  if (!title) { alert('Please enter a title.'); return; }
  try {
    await api('/api/favorites', {method:'POST', body:{
      session_id: state.currentSession.session_id,
      title, tags: state.pendingTags
    }});
    closeSaveModal();
    showToast('★ Saved to favourites!');
  } catch(e) { alert('Error: '+e.message); }
}

// ── Favorites ─────────────────────────────────────────────────────────────────
async function loadFavorites() {
  $('favorites-list').innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  try {
    const favs = await api('/api/favorites');
    if (!favs.length) {
      $('favorites-list').innerHTML = `<div class="empty-state"><div class="icon">★</div><p>No favourites yet.<br/>Run a comparison and save it!</p></div>`;
      return;
    }
    $('favorites-list').innerHTML = favs.map(s=>`
      <div class="fav-card" onclick="showDetail('${s.session_id}')">
        <div class="fav-title">★ ${esc(s.title||'Untitled')}
          <span style="font-size:.7rem;font-weight:400;color:var(--text3)">${s.technique?.replace('_',' ')}</span>
        </div>
        <div class="fav-prompt">${esc((s.prompt||'').slice(0,200))}${s.prompt?.length>200?'…':''}</div>
        <div class="fav-meta">
          <span style="font-size:.72rem;color:var(--text3)">${s.model_a} vs ${s.model_b}</span>
          ${(s.tags||[]).map(t=>`<span class="fav-tag">${esc(t)}</span>`).join('')}
          ${Object.values(s.ratings||{}).map(r=>`<span class="star-display" title="${r.rating}/5">${stars(r.rating)}</span>`).join('')}
          <button class="btn btn-danger" style="font-size:.68rem;padding:3px 10px;margin-left:auto"
            onclick="event.stopPropagation();removeFav('${s.session_id}')">Remove</button>
        </div>
      </div>
    `).join('');
  } catch(e) {
    $('favorites-list').innerHTML = `<div class="error-box">⚠️ ${esc(e.message)}</div>`;
  }
}

async function removeFav(id) {
  if (!confirm('Remove from favourites?')) return;
  await api('/api/favorites/'+id, {method:'DELETE'});
  loadFavorites();
}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHistory() {
  $('history-list').innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  try {
    const sessions = await api('/api/sessions');
    if (!sessions.length) {
      $('history-list').innerHTML = `<div class="empty-state"><div class="icon">🕘</div><p>No sessions yet. Run your first comparison!</p></div>`;
      return;
    }
    $('history-list').innerHTML = sessions.map(s=>`
      <div class="hist-row" onclick="showDetail('${s.session_id}')">
        ${s.is_favorite?'<span class="fav-star">★</span>':''}
        <div style="flex:1;overflow:hidden">
          <div class="hist-prompt">${esc(s.prompt)}</div>
          <div class="hist-models">${s.model_a} vs ${s.model_b}</div>
        </div>
        <span class="hist-tech">${s.technique?.replace('_',' ')}</span>
        <span style="font-size:.7rem;color:var(--text3)">${new Date(s.created_at).toLocaleDateString()}</span>
      </div>
    `).join('');
  } catch(e) {
    $('history-list').innerHTML = `<div class="error-box">⚠️ ${esc(e.message)}</div>`;
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  $('stats-content').innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  try {
    const s = await api('/api/stats');
    const techMax = Math.max(1,...Object.values(s.technique_usage||{}));
    const modMax  = Math.max(1,...Object.values(s.model_usage||{}));
    $('stats-content').innerHTML = `
      <div class="grid-3" style="margin-bottom:24px">
        <div class="stat-card"><div class="stat-num">${s.total_comparisons}</div><div class="stat-label">Total Comparisons</div></div>
        <div class="stat-card"><div class="stat-num">${s.total_favorites}</div><div class="stat-label">Favourites</div></div>
        <div class="stat-card"><div class="stat-num">${s.average_rating||'–'}</div><div class="stat-label">Avg Rating</div></div>
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="section-title" style="font-size:.85rem">Technique Usage</div>
          ${Object.entries(s.technique_usage||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
            <div class="bar-row">
              <div class="bar-label">${k.replace('_',' ')}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/techMax*100)}%"></div></div>
              <div class="bar-count">${v}</div>
            </div>
          `).join('')||'<div style="color:var(--text3);font-size:.8rem">No data yet</div>'}
        </div>
        <div class="card">
          <div class="section-title" style="font-size:.85rem">Model Usage</div>
          ${Object.entries(s.model_usage||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
            <div class="bar-row">
              <div class="bar-label">${k}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/modMax*100)}%;background:linear-gradient(90deg,var(--accent2),var(--accent))"></div></div>
              <div class="bar-count">${v}</div>
            </div>
          `).join('')||'<div style="color:var(--text3);font-size:.8rem">No data yet</div>'}
        </div>
      </div>
    `;
  } catch(e) {
    $('stats-content').innerHTML = `<div class="error-box">⚠️ ${esc(e.message)}</div>`;
  }
}

// ── Session Detail ────────────────────────────────────────────────────────────
async function showDetail(id) {
  $('detail-modal').classList.remove('hidden');
  $('detail-content').innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  try {
    const s = await api('/api/sessions/'+id);
    const sides = [{key:'a',data:s.model_a,cls:'model-tag-a'},{key:'b',data:s.model_b,cls:'model-tag-b'}];
    $('detail-content').innerHTML = `
      <h3 style="font-family:var(--font-head);margin-bottom:16px">${s.title||'Session Detail'}</h3>
      <div style="font-size:.75rem;color:var(--text3);margin-bottom:16px">
        ${s.technique?.replace('_',' ')} · ${new Date(s.created_at).toLocaleString()} · Temp ${s.temperature} · ${s.max_tokens} tokens
      </div>
      <div class="card-sm" style="margin-bottom:20px">
        <label>Prompt</label>
        <div style="font-size:.82rem;color:var(--text2);white-space:pre-wrap;line-height:1.7">${esc(s.prompt)}</div>
      </div>
      <div class="grid-2">
        ${sides.map(({key,data,cls})=>`
          <div class="card">
            <div class="compare-header"><div class="model-label ${cls}">${data.name}</div></div>
            <div class="response-body">${esc(data.response||'(error)')}</div>
            <div class="meta-row">
              <div class="meta-chip">⏱ <span>${data.latency_ms}ms</span></div>
              <div class="meta-chip">🔤 <span>${data.tokens_used} tokens</span></div>
            </div>
            ${s.ratings?.[key] ? `
              <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
                <div style="font-size:.72rem;color:var(--text3)">Rating</div>
                <div style="font-size:1.2rem;color:var(--warn)">${stars(s.ratings[key].rating)}</div>
                ${s.ratings[key].comment?`<div style="font-size:.75rem;color:var(--text2);margin-top:4px">${esc(s.ratings[key].comment)}</div>`:''}
              </div>
            ` : ''}
          </div>
        `).join('')}
      </div>
    `;
  } catch(e) {
    $('detail-content').innerHTML = `<div class="error-box">⚠️ ${esc(e.message)}</div>`;
  }
}
function closeDetailModal() { $('detail-modal').classList.add('hidden'); }

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.add('hidden'); });
});

// ── Misc ──────────────────────────────────────────────────────────────────────
function clearForm() {
  $('user-prompt').value='';
  $('system-prompt').value='';
  $('prompt-preview-wrap').style.display='none';
  $('results-section').style.display='none';
  state.currentSession=null;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed',bottom:'24px',right:'24px',background:'var(--accent3)',color:'#000',
    padding:'10px 20px',borderRadius:'8px',fontFamily:'var(--font-mono)',fontSize:'.82rem',
    zIndex:'200',boxShadow:'0 4px 20px rgba(0,0,0,.4)',animation:'fadeUp .3s ease'
  });
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
